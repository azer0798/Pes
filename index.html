<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>مدونتي الشخصية</title>
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 600px;">
        <h2 class="mb-4 text-center">مدونتي الشخصية</h2>
        
        {% if session.get('admin') %}
            <div class="card p-3 mb-4 shadow-sm border-primary">
                <h5>لوحة تحكم الأدمن</h5>
                <form action="/add" method="POST">
                    <textarea name="content" class="form-control mb-2" placeholder="ما الجديد؟" required></textarea>
                    <button class="btn btn-primary w-100">نشر التدوينة</button>
                </form>
                <a href="/logout" class="btn btn-sm btn-link text-danger mt-2">تسجيل خروج</a>
            </div>
        {% endif %}

        {% for post in posts %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <p class="card-text">{{ post.content }}</p>
                {% if session.get('admin') %}
                    <form action="/delete/{{ post.id }}" method="POST">
                        <button class="btn btn-outline-danger btn-sm">حذف المنشور</button>
                    </form>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
