<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; }</style>
</head>
<body class="p-4">
    <div class="container" style="max-width: 600px;">
        <h2 class="mb-4">مدونتي الشخصية</h2>
        
        {% if session.get('admin') %}
            <div class="card p-3 mb-4 border-primary">
                <h5>لوحة التحكم (أدمن)</h5>
                <form action="/add" method="POST">
                    <textarea name="content" class="form-control mb-2" placeholder="ما الجديد؟" required></textarea>
                    <button class="btn btn-primary w-100">نشر</button>
                </form>
                <a href="/logout" class="btn btn-sm btn-link text-danger">تسجيل خروج</a>
            </div>
        {% endif %}

        {% for post in posts %}
        <div class="card mb-3 p-3">
            <p>{{ post.content }}</p>
            {% if session.get('admin') %}
                <form action="/delete/{{ post.id }}" method="POST">
                    <button class="btn btn-outline-danger btn-sm">حذف</button>
                </form>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
