<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>لوحة التحكم - مدونتي</title>
    <style>
        * {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container-admin {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Header */
        .header-admin {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo-admin {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }
        
        .logo-admin span {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .badge-admin {
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid rgba(240, 147, 251, 0.2);
        }
        
        .btn-admin-action {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-admin-action:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .btn-admin-action-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        
        .btn-admin-action-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            color: white;
        }
        
        /* Admin Panel */
        .panel-admin {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .panel-admin textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }
        
        .panel-admin textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #f093fb;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.1);
            color: white;
        }
        
        .panel-admin textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .panel-admin label {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }
        
        .btn-publish {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
        }
        
        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3);
            color: white;
        }
        
        /* Post Cards */
        .post-admin {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .post-admin:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }
        
        .post-content-admin {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            line-height: 1.9;
        }
        
        .post-meta-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .post-date-admin {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }
        
        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.25);
            color: white;
        }
        
        /* Empty */
        .empty-admin {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        .empty-admin i {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
        }
        
        .empty-admin h5 {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .empty-admin p {
            color: rgba(255, 255, 255, 0.2);
        }
        
        /* Footer */
        .footer-admin {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
        }
        
        @media (max-width: 576px) {
            .header-admin {
                padding: 20px;
            }
            .logo-admin {
                font-size: 1.4rem;
            }
            .post-admin {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container-admin">
        
        <!-- Header -->
        <div class="header-admin">
            <div>
                <h1 class="logo-admin">
                    <i class="bi bi-pencil-square"></i> مدون<span>تي</span>
                </h1>
                <span class="badge-admin">
                    <i class="bi bi-shield-check"></i> لوحة التحكم
                </span>
            </div>
            <div>
                <a href="/" class="btn-admin-action">
                    <i class="bi bi-eye"></i> عرض المدونة
                </a>
                <a href="/logout" class="btn-admin-action btn-admin-action-danger ms-2">
                    <i class="bi bi-box-arrow-right"></i> خروج
                </a>
            </div>
        </div>

        <!-- Add Post -->
        <div class="panel-admin">
            <h5 class="mb-3" style="color: rgba(255,255,255,0.8);">
                <i class="bi bi-plus-circle-fill" style="color: #f093fb;"></i> 
                تدوينة جديدة
            </h5>
            <form action="/add" method="POST">
                <textarea name="content" class="form-control mb-3" 
                          placeholder="اكتب ما تريد مشاركته..." 
                          rows="3" required></textarea>
                <button class="btn btn-publish w-100">
                    <i class="bi bi-send"></i> نشر التدوينة
                </button>
            </form>
        </div>

        <!-- Posts -->
        {% if posts %}
            {% for post in posts %}
                <div class="post-admin">
                    <div class="post-content-admin">
                        {{ post.content }}
                    </div>
                    <div class="post-meta-admin">
                        <span class="post-date-admin">
                            <i class="bi bi-clock"></i> 
                            {{ post.date.strftime('%Y-%m-%d %H:%M') }}
                        </span>
                        <form action="/delete/{{ post.id }}" method="POST" class="m-0">
                            <button class="btn-delete" 
                                    onclick="return confirm('هل أنت متأكد من حذف هذه التدوينة؟')">
                                <i class="bi bi-trash"></i> حذف
                            </button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-admin">
                <i class="bi bi-journal-text"></i>
                <h5 class="mt-3">لا توجد تدوينات</h5>
                <p>أضف أول تدوينة الآن! 🚀</p>
            </div>
        {% endif %}

        <!-- Footer -->
        <div class="footer-admin">
            <i class="bi bi-heart-fill" style="color: rgba(255,255,255,0.1);"></i>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
